name: agriguard_project
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  flutter_lints: ^6.0.0
  lottie: ^3.3.2
  flutter_svg: ^2.2.3
  flutter_screenutil: ^5.9.3
  firebase_core: ^4.4.0
  introduction_screen: ^4.0.0
  firebase_auth: ^6.1.4
  provider: ^6.1.5+1
  equatable: ^2.0.8
  google_sign_in: ^6.2.1
  flutter_blue_plus: ^1.32.12
  firebase_database: ^12.1.3
  permission_handler: ^12.0.1
  bloc: ^9.2.0
  connectivity_plus: ^7.1.1
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2
  http: ^1.6.0
  image_picker: ^1.1.2
  http_parser: ^4.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1



flutter:

  uses-material-design: true

  assets:
    - assets/app_images/images/
    - assets/app_images/animation/
    - assets/app_images/icons/

  fonts:
    - family: AbhayaLibre
      fonts:
        - asset: assets/app_fonts/Abhaya_Libre/AbhayaLibre-Regular.ttf
          weight: 400
        - asset: assets/app_fonts/Abhaya_Libre/AbhayaLibre-Medium.ttf
          weight: 500
        - asset: assets/app_fonts/Abhaya_Libre/AbhayaLibre-SemiBold.ttf
          weight: 600
        - asset: assets/app_fonts/Abhaya_Libre/AbhayaLibre-Bold.ttf
          weight: 700
        - asset: assets/app_fonts/Abhaya_Libre/AbhayaLibre-ExtraBold.ttf
          weight: 800


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_images/images/logo.png"